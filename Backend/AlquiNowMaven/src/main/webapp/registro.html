<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — AlquiNow</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="nav">
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">Alqui<span>Now</span></a></div>
    <nav class="nav-links">
      <a href="index.html">Buscar</a>
      <a href="login.html">Ingresar</a>
    </nav>
  </header>

  <div class="form-box">
    <h1>Creá tu cuenta</h1>
    <p class="sub">Es gratis y toma un minuto.</p>

    <form action="registro" method="post">
      <label for="mail">Mail</label>
      <input type="email" id="mail" name="mail" required>

      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" required minlength="6">

      <label for="dni">DNI</label>
      <input type="text" id="dni" name="dni">

      <label for="tel">Teléfono</label>
      <input type="text" id="tel" name="tel">

      <label for="rol">Quiero usar AlquiNow para…</label>
      <select id="rol" name="rol">
        <option value="comprador">Alquilar propiedades (huésped)</option>
        <option value="vendedor">Publicar mis propiedades (anfitrión)</option>
      </select>

      <button type="submit" class="btn btn-block">Crear cuenta</button>
    </form>

    <p style="text-align:center; margin-top:1.2rem; color:var(--gris);">
      ¿Ya tenés cuenta? <a href="login.html" style="color:var(--brasa);">Ingresá</a>
    </p>
  </div>

</body>
</html>
